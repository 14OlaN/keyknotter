<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&family=IBM+Plex+Mono:ital,wght@0,300;1,300&display=swap" rel="stylesheet">

        body {

            background-repeat: no-repeat;
            background-attachment: fixed;

    <link rel="stylesheet" href="styles_5_graphic.css">
</head>
<body>
    <!-- Canvas lives behind everything -->
    <canvas id="myCanvas"></canvas>

    <!-- Two-column layout -->
    <div class="layout">

    <script src="script_5_graphic.js"></script>
